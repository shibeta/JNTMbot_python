name: "🐞 Bug 反馈 / 错误报告"
description: 程序报错、闪退、卡死或游戏内动作不符合预期
title: "[Bug] <请替换为简短的错误描述>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## ⚠️ 安全警告
        提交 Bug 前，请确认你**没有**在日志或截图中泄露以下敏感信息：
        1. 你的 Steam 账号和密码
        2. `config.yaml` 中的 `steamBotToken` 和 `pushplusToken`
        3. 绝对不要上传工作目录下的 `steam登录缓存请勿分享此文件`！

  - type: dropdown
    id: run-mode
    attributes:
      label: 运行方式 (Run Mode)
      description: 请问你是如何运行本程序的？注意只有最新版本才受支持。
      options:
        - 运行 GitHub 发布的 .exe 发行版 (Latest Build)
        - 运行 GitHub 发布的 .exe 测试版 (Nightly Build)
        - 从最新源码运行
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: 操作系统版本 (OS Version)
      description: 例如：Windows 10 22H2 或 Windows 11
      placeholder: Windows 10 22H2
    validations:
      required: true

  - type: input
    id: resolution
    attributes:
      label: 游戏分辨率与窗口模式 (Game Resolution & Window Mode)
      description: OCR 识别极其依赖分辨率，请如实填写。例如：1920x1080, 无边框窗口化
      placeholder: 1920x1080, 无边框窗口化
    validations:
      required: true

  - type: checkboxes
    id: pre-checks
    attributes:
      label: 游戏设置前置检查 (Pre-checks)
      description: 为排查问题，请确认你已按照 README 完成以下必要设置。**请务必全部检查并勾选！**
      options:
        - label: 游戏版本为 **增强版**
          required: true
        - label: 游戏语言已设置为 **简体中文**
          required: true
        - label: 没有连接 **任何真实的物理手柄**
          required: true
        - label: 没有安装 **PlayStation Accessories**
          required: true
        - label: 没有开启 **自动 HDR** 或者单独为 GTA5 关闭了自动 HDR
          required: true
        - label: 图像设置中已关闭 **失焦时暂停游戏**
          required: true
        - label: 故事模式存档保存时为 **第一人称** 视角
          required: true
        - label: 当前在线模式人物已经作为**房主**完成过一次德瑞差事终章
          required: true
        - label: 出生点已设置为 **事务所** 且带有个人空间
          required: true

  - type: textarea
    id: bug-description
    attributes:
      label: 问题描述 (Bug Description)
      description: 请清晰明了地描述你遇到了什么问题。例如程序在哪一步卡住了，或者识别错了什么。
      placeholder: 程序在识别到“面板已开”后卡住，没有进行下一步的按键操作...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 重现步骤 (Steps to Reproduce)
      description: 请列出触发该 Bug 的具体操作步骤，越详细越好。
      value: |
        1. 启动程序
        2. 游戏内处于...状态
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 报错日志或控制台输出 (Logs)
      description: 请粘贴终端报错信息。请确保**不要包含**敏感令牌！
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 游戏全屏截图 (Screenshots)
      description: 如果程序卡死或无法识别，**极其建议**将卡死时的【游戏画面全屏截图】直接拖拽/粘贴到下方框内。
    validations:
      required: false
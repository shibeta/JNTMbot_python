const TOTAL=35,FACTOR=TOTAL/210;
const META=/^(\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\] \[INFO\] \[[^\]]+\])(.*)/;
const log=document.getElementById("tLog"),prog=document.getElementById("prog");
let t0=null,idx=0;

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function mkLine(txt){
  const d=document.createElement("div");
  const m=META.exec(txt);
  if(m){
    d.innerHTML='<span style="color:#79c0ff">'+esc(m[1])+'</span><span style="color:#e6edf3">'+esc(m[2])+'</span>';
  }else{
    d.style.color="#c9d1d9";
    d.textContent=txt;
  }
  return d;
}

function frame(now){
  if(!t0)t0=now;
  const e=(now-t0)/1000;
  while(idx<LINES.length&&LINES[idx][0]*FACTOR<=e){
    log.appendChild(mkLine(LINES[idx][1]));
    idx++;
  }
  prog.style.width=Math.min(100,(e/TOTAL)*100)+"%";
  if(idx<LINES.length){requestAnimationFrame(frame);}
  else{
    prog.style.width="100%";
    setTimeout(()=>{log.innerHTML="";prog.style.width="0%";t0=null;idx=0;requestAnimationFrame(frame);},3500);
  }
}
requestAnimationFrame(frame);
